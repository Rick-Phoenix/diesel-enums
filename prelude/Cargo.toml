[package]
name = "diesel-enums"
version = { workspace = true }

description = "🔢 Seamless mapping between rust enums and custom postgres types or regular lookup tables, with automatically generated consistency checks."

edition.workspace = true
license = { workspace = true }
repository = { workspace = true }

keywords = ["diesel", "enum", "postgres", "sqlite", "mysql"]

readme = true

[package.metadata.release]
tag = true

[package.metadata.cargo-reedme]
features = ["document-features"]

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[dev-dependencies]
deadpool-diesel = { version = "0.6", features = ["sqlite"] }
diesel = { version = "2.3", features = [
  "sqlite",
  "returning_clauses_for_sqlite_3_35",
] }
tokio = { version = "1", features = ["full"] }

[dependencies]
document-features = { version = "0.2", optional = true }

diesel-enums-proc-macro = { path = "../proc-macro/", version = "0.2.1" }
owo-colors = { version = "4", features = ["supports-colors"] }
thiserror = "2"

tokio = { version = "1", features = [
  "time",
  "macros",
  "sync",
], optional = true }
deadpool-diesel = { version = "0.6", optional = true }
deadpool-sync = { version = "0.1", optional = true }
dotenvy = { version = "0.15", optional = true }
diesel = { version = "2.3" }

[features]

default = []

document-features = ["dep:document-features"]

test-runners = ["dep:tokio", "dep:dotenvy", "dep:deadpool-diesel"]

## Enables support for custom postgres enums
postgres = ["diesel/postgres"]

## Exports the test runner for sqlite
sqlite-async-runner = [
  "diesel/sqlite",
  "test-runners",
  "deadpool-diesel/sqlite",
  "dep:deadpool-sync",
]
## Indicates that the sqlite runner should be used by default
default-sqlite-runner = [
  "sqlite-async-runner",
  "diesel-enums-proc-macro/default-sqlite-runner",
]

## Exports the test runner for postgres
pg-async-runner = ["postgres", "test-runners", "deadpool-diesel/postgres"]
## Indicates that the postgres runner should be used by default
default-pg-runner = [
  "pg-async-runner",
  "diesel-enums-proc-macro/default-pg-runner",
]

## Indicates that the default runner is located at `crate::db_test_runner::DbTestRunner`.
crate-runner = ["diesel-enums-proc-macro/crate-runner"]
## Indicates that the default runner is located at `crate::db_test_runner::DbTestRunner`, and that it is an async runner.
async-crate-runner = ["diesel-enums-proc-macro/async-crate-runner"]
